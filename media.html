<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity</title>
    <link rel="stylesheet" href="css/media.css">
</head>
<body>
    <header>
        <div class="navbar">
            <!-- I am still thinking a name for this website-->
            <span class="brand">WEBSITE'S TITLE</span>

            <button class="menu-toggle" aria-label="Menu" aria-expanded="false" aria-controls="primary-nav">
                <span></span><span></span><span></span>
            </button>

            <nav id="primary-nav" aria-label="Main navigation">
                <a href="index.html" class="nav-item">Home</a>
                <a href="about.html" class="nav-item">About</a>
                <a href="gallery.html" class="nav-item">Gallery</a>
                <a href="media.html" class="nav-item">Media</a>
                <a href="contact.html" class="nav-item">Contact</a>
            </nav>
        </div>
    </header>


    <!-- Footer-->
    <footer class="footer">
        © 2026 Ian Pallares | ITD 210 Project | Northern Virginia Community College | <a href="mailto:ijp32337@email.vccs.edu" style="text-decoration: none;">Contact</a>
    </footer>

    <!-- Tiny JS for the mobile menu -->
    <script>
        const menuToggle = document.querySelector('.menu-toggle');
        const nav = document.getElementById('primary-nav');

        menuToggle.addEventListener('click', () => {
            const isOpen = nav.classList.toggle('active');
            // Update accessibility state
            menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });
    </script>
</body>
</html>
